<div class="wrap" [class.light]="isLight()">
  <button type="button" class="avatar-btn" (click)="toggleOpen()" [attr.aria-expanded]="open()">
    {{ initial() }}
  </button>

  @if (open()) {
    <div class="scrim" (click)="close()"></div>
    <div class="panel" (click)="$event.stopPropagation()">
      <div class="user-info">
        <div class="user-name">{{ trainerName() }}</div>
        @if (email()) {
          <div class="email-row">{{ email() }}</div>
        }
      </div>

      <a routerLink="/profile" class="item item-profile" (click)="close()">
        <span class="dot dot-cyan"></span>My Profile
      </a>

      <div class="divider"></div>

      <a routerLink="/my-team" class="item" (click)="close()"><span class="dot dot-violet"></span>My Team</a>
      <a routerLink="/ai-assistant" class="item" (click)="close()">
        <span class="dot dot-yellow"></span>AI Trainer Assistant
      </a>

      <div class="divider"></div>

      <a routerLink="/settings" class="item" (click)="close()"><span class="dot dot-violet"></span>Settings</a>

      <a routerLink="/support" class="item" (click)="close()"><span class="dot dot-cyan"></span>Support</a>

      <div class="divider"></div>

      <div class="cvd-label">Colorblind Mode</div>
      <div class="cvd-row">
        @for (mode of colorblindModes; track mode.value) {
          <button
            type="button"
            class="cvd-btn"
            [class.active]="colorblind.mode() === mode.value"
            (click)="setColorblindMode(mode.value)"
          >{{ mode.label }}</button>
        }
      </div>

      <div class="divider"></div>

      <button type="button" class="item logout" (click)="logout()">
        <span class="dot dot-bad"></span>Log Out
      </button>
    </div>
  }
</div>
