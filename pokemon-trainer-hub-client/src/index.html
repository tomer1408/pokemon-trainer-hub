<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PokemonTrainerHubClient</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>

  <!-- Colorblind Mode filters — applied to <body> via CSS `filter: url(#...)`
       by ColorblindService. Standard Machado/Oliveira/Fernandes (2009)
       color-vision-deficiency matrices, zero visual footprint on their own
       (width/height 0, positioned out of flow). -->
  <svg class="cvd-filter-defs" aria-hidden="true">
    <defs>
      <filter id="cvd-protanopia">
        <feColorMatrix
          type="matrix"
          values="0.567, 0.433, 0,     0, 0
                  0.558, 0.442, 0,     0, 0
                  0,     0.242, 0.758, 0, 0
                  0,     0,     0,     1, 0"
        />
      </filter>
      <filter id="cvd-deuteranopia">
        <feColorMatrix
          type="matrix"
          values="0.625, 0.375, 0,   0, 0
                  0.7,   0.3,   0,   0, 0
                  0,     0.3,   0.7, 0, 0
                  0,     0,     0,   1, 0"
        />
      </filter>
      <filter id="cvd-tritanopia">
        <feColorMatrix
          type="matrix"
          values="0.95, 0.05,  0,     0, 0
                  0,    0.433, 0.567, 0, 0
                  0,    0.475, 0.525, 0, 0
                  0,    0,     0,     1, 0"
        />
      </filter>
    </defs>
  </svg>
</body>
</html>
