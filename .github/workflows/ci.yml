name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-trainer-hub-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: pokemon-trainer-hub-server/package-lock.json
      - run: npm ci
      - run: npm test

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokemon-trainer-hub-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: pokemon-trainer-hub-client/package-lock.json
      - run: npm ci
      - run: npm test
